<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CareCompass Browser Guide settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">CareCompass Browser Guide</p>
      <h1>Developer connection</h1>
      <p class="intro">Choose where the extension sends its filtered page summary. API keys always stay on that backend.</p>

      <fieldset>
        <legend>Backend</legend>
        <label>
          <input type="radio" name="api-mode" value="automatic">
          <span><strong>Automatic</strong><small>Use localhost for local pages and the deployed API for other sites.</small></span>
        </label>
        <label>
          <input type="radio" name="api-mode" value="local">
          <span><strong>Local development</strong><small>Use http://localhost:8000 on every website. Select this while testing the unpacked extension.</small></span>
        </label>
        <label>
          <input type="radio" name="api-mode" value="production">
          <span><strong>Deployed backend</strong><small>Always use the production CareCompass API.</small></span>
        </label>
      </fieldset>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
